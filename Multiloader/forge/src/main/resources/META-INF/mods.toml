modLoader="javafml"
loaderVersion="${forge_loader_version_range}"
license="${mod_license}"

[[mixins]]
    config="projectbabel-common.mixins.json"

[[mixins]]
    config="projectbabel.mixins.json"


[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_display_name}"
    description='''
${mod_description}
GitHub: ${mod_sources}
'''
    logoFile="${mod_icon}"
    authors="${mod_authors}"
